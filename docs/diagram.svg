<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#0f0f1a"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0"
        font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="bold">
    LaserCat — Diagrama de Conexión
  </text>

  <!-- ══════════════ NodeMCU ══════════════ -->
  <rect x="30" y="55" width="158" height="370" rx="10"
        fill="#1a2e10" stroke="#4a8024" stroke-width="2"/>
  <!-- PCB header bar -->
  <rect x="30" y="55" width="158" height="28" rx="10" fill="#2d5016"/>
  <rect x="30" y="69" width="158" height="14" fill="#2d5016"/>
  <text x="109" y="73" text-anchor="middle" fill="#90ee90"
        font-family="monospace" font-size="12" font-weight="bold">NodeMCU</text>
  <text x="109" y="88" text-anchor="middle" fill="#70c050"
        font-family="monospace" font-size="9">ESP8266</text>

  <!-- Pin rows (left side - unused, decorative) -->
  <g fill="#3a5a2a" stroke="#4a7a34" stroke-width="1">
    <rect x="18" y="100" width="12" height="8" rx="2"/>
    <rect x="18" y="116" width="12" height="8" rx="2"/>
    <rect x="18" y="132" width="12" height="8" rx="2"/>
    <rect x="18" y="148" width="12" height="8" rx="2"/>
    <rect x="18" y="164" width="12" height="8" rx="2"/>
    <rect x="18" y="180" width="12" height="8" rx="2"/>
    <rect x="18" y="196" width="12" height="8" rx="2"/>
    <rect x="18" y="212" width="12" height="8" rx="2"/>
    <rect x="18" y="228" width="12" height="8" rx="2"/>
    <rect x="18" y="244" width="12" height="8" rx="2"/>
    <rect x="18" y="260" width="12" height="8" rx="2"/>
    <rect x="18" y="276" width="12" height="8" rx="2"/>
    <rect x="18" y="292" width="12" height="8" rx="2"/>
    <rect x="18" y="308" width="12" height="8" rx="2"/>
    <rect x="18" y="324" width="12" height="8" rx="2"/>
    <rect x="18" y="340" width="12" height="8" rx="2"/>
    <rect x="18" y="356" width="12" height="8" rx="2"/>
    <rect x="18" y="372" width="12" height="8" rx="2"/>
    <rect x="18" y="388" width="12" height="8" rx="2"/>
  </g>

  <!-- Active pins (right side) -->
  <!-- D5 (GPIO14) -->
  <rect x="188" y="128" width="12" height="8" rx="2" fill="#e6b800" stroke="#ffd700" stroke-width="1"/>
  <text x="183" y="136" text-anchor="end" fill="#ffd700"
        font-family="monospace" font-size="10">D5 · GPIO14</text>

  <!-- D6 (GPIO12) -->
  <rect x="188" y="188" width="12" height="8" rx="2" fill="#e6b800" stroke="#ffd700" stroke-width="1"/>
  <text x="183" y="196" text-anchor="end" fill="#ffd700"
        font-family="monospace" font-size="10">D6 · GPIO12</text>

  <!-- D8 (GPIO15) -->
  <rect x="188" y="268" width="12" height="8" rx="2" fill="#cc7700" stroke="#ff9500" stroke-width="1"/>
  <text x="183" y="276" text-anchor="end" fill="#ff9500"
        font-family="monospace" font-size="10">D8 · GPIO15</text>

  <!-- VIN -->
  <rect x="188" y="340" width="12" height="8" rx="2" fill="#cc2200" stroke="#ff4444" stroke-width="1"/>
  <text x="183" y="348" text-anchor="end" fill="#ff6666"
        font-family="monospace" font-size="10">VIN  5V</text>

  <!-- GND -->
  <rect x="188" y="388" width="12" height="8" rx="2" fill="#555" stroke="#888" stroke-width="1"/>
  <text x="183" y="396" text-anchor="end" fill="#aaaaaa"
        font-family="monospace" font-size="10">GND</text>

  <!-- ══════════════ Power / GND rails ══════════════ -->
  <!-- VIN horizontal rail -->
  <line x1="200" y1="344" x2="340" y2="344" stroke="#ff4444" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="340" y1="344" x2="340" y2="100" stroke="#ff4444" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- GND horizontal rail -->
  <line x1="200" y1="392" x2="320" y2="392" stroke="#888" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="320" y1="392" x2="320" y2="100" stroke="#888" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- ══════════════ Servo A ══════════════ -->
  <rect x="490" y="75" width="180" height="90" rx="8"
        fill="#0d2744" stroke="#4d9de0" stroke-width="2"/>
  <text x="580" y="100" text-anchor="middle" fill="#4d9de0"
        font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold">SERVO A</text>
  <text x="580" y="116" text-anchor="middle" fill="#7ab8e8"
        font-family="monospace" font-size="9">Pan · 0° → 90°</text>

  <!-- Servo A pins -->
  <circle cx="494" cy="135" r="5" fill="#ffd700" stroke="#e6b800" stroke-width="1"/>
  <text x="504" y="139" fill="#ffd700" font-family="monospace" font-size="9">SIG</text>
  <circle cx="494" cy="151" r="5" fill="#ff4444" stroke="#cc2200" stroke-width="1"/>
  <text x="504" y="155" fill="#ff6666" font-family="monospace" font-size="9">VCC</text>
  <circle cx="494" cy="166" r="5" fill="#888" stroke="#555" stroke-width="1"/>
  <text x="504" y="170" fill="#aaaaaa" font-family="monospace" font-size="9">GND</text>

  <!-- D5 → Servo A SIG -->
  <line x1="200" y1="132" x2="280" y2="132" stroke="#ffd700" stroke-width="2"/>
  <line x1="280" y1="132" x2="280" y2="135" stroke="#ffd700" stroke-width="2"/>
  <line x1="280" y1="135" x2="489" y2="135" stroke="#ffd700" stroke-width="2"/>

  <!-- VIN rail → Servo A VCC -->
  <line x1="340" y1="151" x2="489" y2="151" stroke="#ff4444" stroke-width="2"/>

  <!-- GND rail → Servo A GND -->
  <line x1="320" y1="166" x2="489" y2="166" stroke="#888" stroke-width="2"/>

  <!-- ══════════════ Servo B ══════════════ -->
  <rect x="490" y="210" width="180" height="90" rx="8"
        fill="#0d2744" stroke="#4d9de0" stroke-width="2"/>
  <text x="580" y="235" text-anchor="middle" fill="#4d9de0"
        font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold">SERVO B</text>
  <text x="580" y="251" text-anchor="middle" fill="#7ab8e8"
        font-family="monospace" font-size="9">Tilt · -85° → 85°</text>

  <!-- Servo B pins -->
  <circle cx="494" cy="270" r="5" fill="#ffd700" stroke="#e6b800" stroke-width="1"/>
  <text x="504" y="274" fill="#ffd700" font-family="monospace" font-size="9">SIG</text>
  <circle cx="494" cy="286" r="5" fill="#ff4444" stroke="#cc2200" stroke-width="1"/>
  <text x="504" y="290" fill="#ff6666" font-family="monospace" font-size="9">VCC</text>
  <circle cx="494" cy="300" r="5" fill="#888" stroke="#555" stroke-width="1"/>
  <text x="504" y="304" fill="#aaaaaa" font-family="monospace" font-size="9">GND</text>

  <!-- D6 → Servo B SIG -->
  <line x1="200" y1="192" x2="290" y2="192" stroke="#ffd700" stroke-width="2"/>
  <line x1="290" y1="192" x2="290" y2="270" stroke="#ffd700" stroke-width="2"/>
  <line x1="290" y1="270" x2="489" y2="270" stroke="#ffd700" stroke-width="2"/>

  <!-- VIN rail → Servo B VCC -->
  <line x1="340" y1="286" x2="489" y2="286" stroke="#ff4444" stroke-width="2"/>

  <!-- GND rail → Servo B GND -->
  <line x1="320" y1="300" x2="489" y2="300" stroke="#888" stroke-width="2"/>

  <!-- ══════════════ Resistor 1kΩ ══════════════ -->
  <rect x="248" y="264" width="72" height="20" rx="5"
        fill="#5a3010" stroke="#cd853f" stroke-width="2"/>
  <!-- Resistor bands -->
  <rect x="261" y="264" width="5" height="20" rx="1" fill="#8B0000" opacity="0.8"/>
  <rect x="271" y="264" width="5" height="20" rx="1" fill="#111" opacity="0.8"/>
  <rect x="281" y="264" width="5" height="20" rx="1" fill="#8B0000" opacity="0.8"/>
  <rect x="295" y="264" width="5" height="20" rx="1" fill="#DAA520" opacity="0.8"/>
  <text x="284" y="280" text-anchor="middle" fill="#ffd700"
        font-family="monospace" font-size="9" font-weight="bold">1kΩ</text>

  <!-- D8 → Resistor left -->
  <line x1="200" y1="272" x2="248" y2="272" stroke="#ff9500" stroke-width="2"/>
  <!-- Resistor right → Transistor Base -->
  <line x1="320" y1="272" x2="380" y2="272" stroke="#ff9500" stroke-width="2"/>
  <line x1="380" y1="272" x2="380" y2="370" stroke="#ff9500" stroke-width="2"/>

  <!-- ══════════════ NPN Transistor ══════════════ -->
  <!-- Body -->
  <circle cx="420" cy="390" r="32" fill="#1e1e1e" stroke="#888" stroke-width="2"/>
  <text x="420" y="385" text-anchor="middle" fill="#e0e0e0"
        font-family="monospace" font-size="11" font-weight="bold">NPN</text>
  <text x="420" y="400" text-anchor="middle" fill="#aaa"
        font-family="monospace" font-size="9">BC547</text>

  <!-- Base pin (left) -->
  <line x1="388" y1="390" x2="380" y2="390" stroke="#ff9500" stroke-width="2"/>
  <line x1="380" y1="390" x2="380" y2="370" stroke="#ff9500" stroke-width="2"/>
  <text x="370" y="395" text-anchor="end" fill="#ff9500"
        font-family="monospace" font-size="10" font-weight="bold">B</text>

  <!-- Collector pin (top) -->
  <line x1="420" y1="358" x2="420" y2="340" stroke="#ff4444" stroke-width="2"/>
  <text x="430" y="352" fill="#ff6666" font-family="monospace" font-size="10" font-weight="bold">C</text>

  <!-- Emitter pin (bottom) -->
  <line x1="420" y1="422" x2="420" y2="450" stroke="#888" stroke-width="2"/>
  <line x1="420" y1="450" x2="320" y2="450" stroke="#888" stroke-width="2"/>
  <line x1="320" y1="450" x2="320" y2="392" stroke="#888" stroke-width="2"/>
  <text x="430" y="435" fill="#aaaaaa" font-family="monospace" font-size="10" font-weight="bold">E</text>

  <!-- ══════════════ Láser ══════════════ -->
  <rect x="490" y="350" width="180" height="80" rx="8"
        fill="#2a0000" stroke="#ff3333" stroke-width="2"/>
  <!-- Laser beam decoration -->
  <line x1="670" y1="370" x2="700" y2="360" stroke="#ff3333" stroke-width="1.5" opacity="0.7"/>
  <line x1="670" y1="382" x2="705" y2="382" stroke="#ff3333" stroke-width="2" opacity="0.9"/>
  <line x1="670" y1="394" x2="700" y2="404" stroke="#ff3333" stroke-width="1.5" opacity="0.7"/>
  <circle cx="710" cy="382" r="6" fill="#ff3333" opacity="0.5"/>
  <circle cx="710" cy="382" r="3" fill="#ffaaaa"/>

  <text x="575" y="383" text-anchor="middle" fill="#ff6666"
        font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold">LÁSER</text>
  <text x="575" y="400" text-anchor="middle" fill="#ff9999"
        font-family="monospace" font-size="9">5mW · 650nm</text>

  <!-- Laser (+) pin -->
  <circle cx="494" cy="375" r="5" fill="#ff4444" stroke="#cc2200" stroke-width="1"/>
  <text x="484" y="372" text-anchor="end" fill="#ff6666"
        font-family="monospace" font-size="10" font-weight="bold">+</text>

  <!-- Laser GND pin -->
  <circle cx="494" cy="395" r="5" fill="#888" stroke="#555" stroke-width="1"/>
  <text x="484" y="399" text-anchor="end" fill="#aaaaaa"
        font-family="monospace" font-size="10" font-weight="bold">−</text>

  <!-- VIN → Laser (+) -->
  <line x1="340" y1="344" x2="460" y2="344" stroke="#ff4444" stroke-width="2"/>
  <line x1="460" y1="344" x2="460" y2="375" stroke="#ff4444" stroke-width="2"/>
  <line x1="460" y1="375" x2="489" y2="375" stroke="#ff4444" stroke-width="2"/>

  <!-- Laser (−) → Collector -->
  <line x1="489" y1="395" x2="460" y2="395" stroke="#ff4444" stroke-width="2"/>
  <line x1="460" y1="395" x2="460" y2="420" stroke="#ff4444" stroke-width="2"/>
  <line x1="420" y1="340" x2="420" y2="340" stroke="#ff4444" stroke-width="2"/>
  <!-- Laser - to Collector vertical line -->
  <line x1="460" y1="420" x2="460" y2="340" stroke="#ff4444" stroke-width="2"/>
  <line x1="460" y1="340" x2="420" y2="340" stroke="#ff4444" stroke-width="2"/>

  <!-- GND rail → Laser GND (via emitter shown already) -->

  <!-- ══════════════ Labels on wires ══════════════ -->
  <rect x="198" y="120" width="74" height="14" rx="3" fill="#1a1a1a" opacity="0.85"/>
  <text x="235" y="131" text-anchor="middle" fill="#ffd700"
        font-family="monospace" font-size="9">SIG Servo A</text>

  <rect x="198" y="200" width="74" height="14" rx="3" fill="#1a1a1a" opacity="0.85"/>
  <text x="235" y="211" text-anchor="middle" fill="#ffd700"
        font-family="monospace" font-size="9">SIG Servo B</text>

  <rect x="198" y="258" width="44" height="14" rx="3" fill="#1a1a1a" opacity="0.85"/>
  <text x="220" y="269" text-anchor="middle" fill="#ff9500"
        font-family="monospace" font-size="9">Láser</text>

  <!-- ══════════════ Legend ══════════════ -->
  <rect x="30" y="462" width="740" height="48" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="50" y="479" fill="#999" font-family="monospace" font-size="9">LEYENDA:</text>

  <line x1="110" y1="474" x2="145" y2="474" stroke="#ffd700" stroke-width="2"/>
  <text x="150" y="478" fill="#ffd700" font-family="monospace" font-size="10">Señal servo</text>

  <line x1="245" y1="474" x2="280" y2="474" stroke="#ff9500" stroke-width="2"/>
  <text x="285" y="478" fill="#ff9500" font-family="monospace" font-size="10">Control láser</text>

  <line x1="390" y1="474" x2="425" y2="474" stroke="#ff4444" stroke-width="2"/>
  <text x="430" y="478" fill="#ff6666" font-family="monospace" font-size="10">VCC 5V</text>

  <line x1="510" y1="474" x2="545" y2="474" stroke="#888" stroke-width="2"/>
  <text x="550" y="478" fill="#aaaaaa" font-family="monospace" font-size="10">GND</text>

  <line x1="620" y1="474" x2="655" y2="474" stroke="#ff4444" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="660" y="478" fill="#ff6666" font-family="monospace" font-size="10">Rail VCC</text>

  <!-- Second legend row -->
  <text x="110" y="499" fill="#888" font-family="monospace" font-size="9">
    ⚠  Alimentar servos desde VIN o fuente externa 5V/2A — NO usar pin 3V3
  </text>
</svg>
